name: skinova
description: AI-powered personalized skin health prediction app
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0

  # State management
  provider: ^6.1.1

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Camera & image
  camera: ^0.10.5
  image_picker: ^1.0.7
  image: ^4.1.7

  # Barcode scanning
  mobile_scanner: ^3.5.6

  # Charts (for skin history graph)
  fl_chart: ^0.67.0

  # Fonts
  google_fonts: ^6.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Light.ttf
          weight: 300
        - asset: assets/fonts/CormorantGaramond-Regular.ttf
          weight: 400
        - asset: assets/fonts/CormorantGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/CormorantGaramond-Italic.ttf
          style: italic

    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300

  assets:
    - assets/images/
    - assets/icons/
